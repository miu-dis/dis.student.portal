<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Dashboard - DIS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-slate-900 text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3 gap-2">
                <img src="assets/img/logo.png" alt="Logo" class="h-10 w-auto">
                <h1 class="text-xl font-bold tracking-wide">Master Admin Panel</h1>
            </div>
            <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-xs font-bold transition">Logout</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div class="p-4 bg-blue-100 text-blue-600 rounded-full"><i class="fa-solid fa-users text-2xl"></i></div>
                <div><p class="text-slate-500 text-sm font-medium">Total Students</p><h3 class="text-2xl font-bold" id="countUsers">0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div class="p-4 bg-amber-100 text-amber-600 rounded-full"><i class="fa-solid fa-bullhorn text-2xl"></i></div>
                <div><p class="text-slate-500 text-sm font-medium">Active Notices</p><h3 class="text-2xl font-bold" id="countNotices">0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div class="p-4 bg-emerald-100 text-emerald-600 rounded-full"><i class="fa-solid fa-calendar-days text-2xl"></i></div>
                <div><p class="text-slate-500 text-sm font-medium">Total Routines</p><h3 class="text-2xl font-bold" id="countRoutines">0</h3></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-8">
                <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                    <h3 class="text-lg font-bold mb-4 flex items-center text-slate-800">
                        <i class="fa-solid fa-pen-to-square mr-2 text-emerald-600"></i> <span>Post New Notice</span>
                    </h3>
                    <form id="noticeForm" class="space-y-4">
                        <textarea id="noticeText" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm" rows="3" placeholder="Type notice content here..."></textarea>
                        <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-xl font-bold hover:bg-emerald-700 transition">Publish Notice</button>
                    </form>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                    <h3 class="text-lg font-bold mb-4 flex items-center text-slate-800">
                        <i class="fa-solid fa-calendar-days mr-2 text-blue-600"></i> <span id="routineFormTitle">Add New Routine</span>
                    </h3>
                    <form id="routineForm" class="space-y-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Routine Target Board</label>
                            <select id="rtBoardType" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none">
                                <option value="daily">Daily Today's Update (আজকের সাময়িক আপডেট)</option>
                                <option value="permanent">Permanent Main Board (স্থায়ী মূল রুটিন)</option>
                            </select>
                        </div>
                        <div>
                            <input type="text" id="rtSubject" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Subject Name">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="rtCourseCode" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Course Code">
                            <input type="text" id="rtRoom" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Room No">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="rtTeacher" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Teacher Name">
                            <input type="text" id="rtTeacherCode" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Teacher Code">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="rtBatchNumber" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Batch No (e.g. 52)">
                            <select id="rtGender" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none font-semibold">
                                <option value="Male">Male (ভাইদের শাখা)</option>
                                <option value="Female">Female (বোনদের শাখা)</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] text-slate-400">Time From</label>
                                <input type="time" id="rtTimeFrom" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-400">Time To</label>
                                <input type="time" id="rtTimeTo" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none">
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button type="submit" id="rtSubmitBtn" class="w-full bg-blue-600 text-white py-2 rounded-xl font-bold hover:bg-blue-700 transition text-xs mt-2">Add to Routine Board</button>
                            <button type="button" id="rtCancelBtn" class="w-1/3 bg-slate-300 text-slate-700 py-2 rounded-xl font-bold hover:bg-slate-400 transition text-xs mt-2 hidden">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800 text-sm"><i class="fa-solid fa-sliders text-blue-600 mr-2"></i> রুটিন কন্ট্রোল প্যানেল (এডিট ও ডিলিট বোর্ড)</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-100 text-slate-600 uppercase font-semibold">
                                <tr>
                                    <th class="px-4 py-3">Board</th>
                                    <th class="px-4 py-3">Subject</th>
                                    <th class="px-4 py-3">Batch</th>
                                    <th class="px-4 py-3">Section</th>
                                    <th class="px-4 py-3 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="routineTableBody" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b border-slate-100 bg-slate-50">
                        <h3 class="font-bold text-slate-800 text-sm"><i class="fa-solid fa-bullhorn text-emerald-600 mr-2"></i> একটিভ নোটিশ বোর্ড (ডিলিট প্যানেল)</h3>
                    </div>
                    <div class="p-4">
                        <div id="noticeListContainer" class="space-y-2 max-h-[250px] overflow-y-auto">
                            </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800 text-sm"><i class="fa-solid fa-user-gear text-indigo-600 mr-2"></i> স্টুডেন্ট ডাটাবেজ কন্ট্রোল</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-100 text-slate-600 uppercase font-semibold">
                                <tr>
                                    <th class="px-4 py-3">Name</th>
                                    <th class="px-4 py-3">ID</th>
                                    <th class="px-4 py-3">Batch & Trimester</th>
                                    <th class="px-4 py-3 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db } from "./assets/js/app.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, doc, getDoc, deleteDoc, addDoc, updateDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let editRoutineId = null; // এডিট ট্র্যাকিং গ্লোবাল আইডি

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists() || userDoc.data().role !== 'admin') {
                    await signOut(auth);
                    window.location.href = "login.html";
                } else {
                    initLiveListeners();
                }
            } else {
                window.location.href = "login.html";
            }
        });

        function initLiveListeners() {
            // ১. লাইভ স্টুডেন্ট ডাটা লোডার
            onSnapshot(collection(db, "users"), (snapshot) => {
                document.getElementById('countUsers').innerText = snapshot.size - 1; // অ্যাডমিন বাদে কাউন্ট
                const tableBody = document.getElementById('studentTableBody');
                tableBody.innerHTML = '';
                snapshot.forEach((user) => {
                    const data = user.data();
                    if(data.role !== 'admin') {
                        tableBody.innerHTML += `
                            <tr class="hover:bg-slate-50 transition">
                                <td class="px-4 py-3 font-medium text-slate-900">${data.name}</td>
                                <td class="px-4 py-3 text-slate-600">${data.universityUID || 'N/A'}</td>
                                <td class="px-4 py-3 text-slate-600">Batch ${data.batchNumber || 'N/A'} - (${data.semester || 'N/A'})</td>
                                <td class="px-4 py-3 text-center">
                                    <button onclick="deleteStudent('${user.id}')" class="text-red-500 hover:text-red-700 font-bold"><i class="fa-solid fa-trash-can"></i></button>
                                </td>
                            </tr>
                        `;
                    }
                });
            });

            // ২. রিয়েলটাইম রুটিন এডিটর কন্ট্রোল লুপ
            onSnapshot(query(collection(db, "routines"), orderBy("createdAt", "desc")), (snapshot) => {
                document.getElementById('countRoutines').innerText = snapshot.size;
                const routineBody = document.getElementById('routineTableBody');
                routineBody.innerHTML = '';
                snapshot.forEach((rtDoc) => {
                    const data = rtDoc.data();
                    routineBody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-4 py-3 capitalize font-bold ${data.boardType === 'daily' ? 'text-amber-600' : 'text-teal-600'}">${data.boardType}</td>
                            <td class="px-4 py-3 font-medium text-slate-900">${data.subject} (${data.courseCode})</td>
                            <td class="px-4 py-3 text-slate-600">Batch ${data.batchNumber}</td>
                            <td class="px-4 py-3 text-slate-600">${data.gender}</td>
                            <td class="px-4 py-3 text-center space-x-3">
                                <button onclick="triggerEditRoutine('${rtDoc.id}')" class="text-blue-600 hover:text-blue-800 font-bold text-sm"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button onclick="deleteRoutine('${rtDoc.id}')" class="text-red-600 hover:text-red-800 font-bold text-sm"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });

            // ৩. রিয়েলটাইম নোটিশ মডারেশন লিস্ট
            onSnapshot(query(collection(db, "notices"), orderBy("createdAt", "desc")), (snapshot) => {
                document.getElementById('countNotices').innerText = snapshot.size;
                const container = document.getElementById('noticeListContainer');
                container.innerHTML = '';
                if(snapshot.size === 0) {
                    container.innerHTML = `<p class="text-slate-400 text-xs text-center py-4">No active notices found.</p>`;
                }
                snapshot.forEach((ntDoc) => {
                    const data = ntDoc.data();
                    container.innerHTML += `
                        <div class="flex justify-between items-start bg-slate-50 p-3 rounded-lg border border-slate-100">
                            <p class="text-slate-700 text-xs flex-1 pr-4">${data.content}</p>
                            <button onclick="deleteNotice('${ntDoc.id}')" class="text-red-500 hover:text-red-700 text-xs font-bold"><i class="fa-solid fa-circle-xmark text-lg"></i></button>
                        </div>
                    `;
                });
            });
        }

        // গ্লোবাল ফাংশনসমূহ (উইন্ডো অবজেক্টে পুশ করা হয়েছে যাতে HTML থেকে সরাসরি কল করা যায়)
        window.deleteStudent = async (id) => {
            if(confirm("Are you sure you want to delete this student account?")) {
                await deleteDoc(doc(db, "users", id));
                alert("Student account deleted!");
            }
        }

        window.deleteNotice = async (id) => {
            if(confirm("Delete this notice permanently?")) {
                await deleteDoc(doc(db, "notices", id));
                alert("Notice removed!");
            }
        }

        window.deleteRoutine = async (id) => {
            if(confirm("Delete this routine class slot?")) {
                await deleteDoc(doc(db, "routines", id));
                alert("Routine entry deleted!");
                if(editRoutineId === id) resetRoutineForm();
            }
        }

        // রুটিন এডিট মুড অ্যাক্টিভেশন লজিক
        window.triggerEditRoutine = async (id) => {
            const docRef = doc(db, "routines", id);
            const docSnap = await getDoc(docRef);
            if(docSnap.exists()) {
                const data = docSnap.data();
                editRoutineId = id;
                
                // ফর্ম ফিল্ডে আগের ডেটা পুশ করা
                document.getElementById('rtBoardType').value = data.boardType;
                document.getElementById('rtSubject').value = data.subject;
                document.getElementById('rtCourseCode').value = data.courseCode;
                document.getElementById('rtRoom').value = data.room;
                document.getElementById('rtTeacher').value = data.teacher;
                document.getElementById('rtTeacherCode').value = data.teacherCode;
                document.getElementById('rtBatchNumber').value = data.batchNumber;
                document.getElementById('rtGender').value = data.gender;
                
                if(data.timeSlot && data.timeSlot.includes(" - ")) {
                    const times = data.timeSlot.split(" - ");
                    document.getElementById('rtTimeFrom').value = times[0];
                    document.getElementById('rtTimeTo').value = times[1];
                }

                // বাটন ও ফর্মের রূপ পরিবর্তন
                document.getElementById('routineFormTitle').innerText = "Edit Routine Entry";
                document.getElementById('rtSubmitBtn').innerText = "Update Routine (সংরক্ষণ করুন)";
                document.getElementById('rtSubmitBtn').classList.replace('bg-blue-600', 'bg-amber-600');
                document.getElementById('rtCancelBtn').classList.remove('hidden');
                document.getElementById('rtSubject').focus();
            }
        }

        function resetRoutineForm() {
            editRoutineId = null;
            document.getElementById('routineForm').reset();
            document.getElementById('routineFormTitle').innerText = "Add New Routine";
            document.getElementById('rtSubmitBtn').innerText = "Add to Routine Board";
            document.getElementById('rtSubmitBtn').classList.replace('bg-amber-600', 'bg-blue-600');
            document.getElementById('rtCancelBtn').classList.add('hidden');
        }

        document.getElementById('rtCancelBtn').addEventListener('click', resetRoutineForm);

        // রুটিন সাবমিশন লজিক (যৌথ Add / Edit প্রসেসর)
        document.getElementById('routineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const boardType = document.getElementById('rtBoardType').value;
            const subject = document.getElementById('rtSubject').value;
            const courseCode = document.getElementById('rtCourseCode').value;
            const room = document.getElementById('rtRoom').value;
            const teacher = document.getElementById('rtTeacher').value;
            const teacherCode = document.getElementById('rtTeacherCode').value;
            const batchNo = document.getElementById('rtBatchNumber').value;
            const gender = document.getElementById('rtGender').value;
            const timeFrom = document.getElementById('rtTimeFrom').value;
            const timeTo = document.getElementById('rtTimeTo').value;

            const routineData = {
                boardType: boardType,
                subject: subject,
                courseCode: courseCode,
                room: room,
                teacher: teacher,
                teacherCode: teacherCode,
                batchNumber: batchNo,
                gender: gender,
                timeSlot: `${timeFrom} - ${timeTo}`,
                createdAt: serverTimestamp()
            };

            try {
                if (editRoutineId) {
                    await updateDoc(doc(db, "routines", editRoutineId), routineData);
                    alert("Routine updated successfully!");
                } else {
                    await addDoc(collection(db, "routines"), routineData);
                    alert("New routine added successfully!");
                }
                resetRoutineForm();
            } catch (error) {
                alert("Error saving routine: " + error.message);
            }
        });

        // নোটিশ পাবলিশ হ্যান্ডলার
        document.getElementById('noticeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('noticeText').value;
            try {
                await addDoc(collection(db, "notices"), {
                    content: text,
                    createdAt: serverTimestamp()
                });
                alert("Notice published successfully!");
                document.getElementById('noticeText').value = '';
            } catch (error) {
                alert("Error publishing notice: " + error.message);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "login.html");
        });
    </script>
</body>
</html>
