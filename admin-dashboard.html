<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Dashboard - DIS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-slate-900 text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3 gap-2">
                <img src="assets/img/logo.png" alt="Logo" class="h-10 w-auto">
                <h1 class="text-xl font-bold tracking-wide">Master Admin Panel</h1>
            </div>
            <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-xs font-bold transition">Logout</button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div class="p-4 bg-blue-100 text-blue-600 rounded-full"><i class="fa-solid fa-users text-2xl"></i></div>
                <div><p class="text-slate-500 text-sm font-medium">Total Students</p><h3 class="text-2xl font-bold" id="countUsers">0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div class="p-4 bg-amber-100 text-amber-600 rounded-full"><i class="fa-solid fa-bullhorn text-2xl"></i></div>
                <div><p class="text-slate-500 text-sm font-medium">Active Notices</p><h3 class="text-2xl font-bold" id="countNotices">0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                <div class="p-4 bg-emerald-100 text-emerald-600 rounded-full"><i class="fa-solid fa-calendar-days text-2xl"></i></div>
                <div><p class="text-slate-500 text-sm font-medium">Total Routines</p><h3 class="text-2xl font-bold" id="countRoutines">0</h3></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-8">
                <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                    <h3 class="text-lg font-bold mb-4 flex items-center text-slate-800">
                        <i class="fa-solid fa-pen-to-square mr-2 text-emerald-600"></i> <span>Post New Notice</span>
                    </h3>
                    <form id="noticeForm" class="space-y-4">
                        <textarea id="noticeText" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm" rows="3" placeholder="Type notice content here..."></textarea>
                        <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-xl font-bold hover:bg-emerald-700 transition">Publish Notice</button>
                    </form>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                    <h3 class="text-lg font-bold mb-4 flex items-center text-slate-800">
                        <i class="fa-solid fa-calendar-days mr-2 text-blue-600"></i> <span id="routineFormTitle">Add New Routine</span>
                    </h3>
                    <form id="routineForm" class="space-y-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Routine Target Board</label>
                            <select id="rtBoardType" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none">
                                <option value="daily">Daily Today's Update (আজকের সাময়িক আপডেট)</option>
                                <option value="permanent">Permanent Main Board (স্থায়ী মূল রুটিন)</option>
                            </select>
                        </div>
                        <div>
                            <input type="text" id="rtSubject" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Subject Name">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="rtCourseCode" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Course Code">
                            <input type="text" id="rtRoom" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Room No">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="rtTeacher" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Teacher Name">
                            <input type="text" id="rtTeacherCode" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Teacher Code">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="rtBatchNumber" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none" placeholder="Batch No (e.g. 52)">
                            <select id="rtGender" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none font-semibold">
                                <option value="Male">Male (ভাইদের শাখা)</option>
                                <option value="Female">Female (বোনদের শাখা)</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] text-slate-400">Time From</label>
                                <input type="time" id="rtTimeFrom" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-400">Time To</label>
                                <input type="time" id="rtTimeTo" required class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none">
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button type="submit" id="rtSubmitBtn" class="w-full bg-blue-600 text-white py-2 rounded-xl font-bold hover:bg-blue-700 transition text-xs mt-2">Add to Routine Board</button>
                            <button type="button" id="rtCancelBtn" class="w-1/3 bg-slate-300 text-slate-700 py-2 rounded-xl font-bold hover:bg-slate-400 transition text-xs mt-2 hidden">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800 text-sm"><i class="fa-solid fa-sliders text-blue-600 mr-2"></i> রুটিন কন্ট্রোল প্যানেল (এডিট ও ডিলিট বোর্ড)</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-100 text-slate-600 uppercase font-semibold">
                                <tr>
                                    <th class="px-4 py-3">Board</th>
                                    <th class="px-4 py-3">Subject</th>
                                    <th class="px-4 py-3">Batch</th>
                                    <th class="px-4 py-3">Section</th>
                                    <th class="px-4 py-3 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="routineTableBody" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b border-slate-100 bg-slate-50">
                        <h3 class="font-bold text-slate-800 text-sm"><i class="fa-solid fa-bullhorn text-emerald-600 mr-2"></i> একটিভ নোটিশ বোর্ড (ডিলিট প্যানেল)</h3>
                    </div>
                    <div class="p-4">
                        <div id="noticeListContainer" class="space-y-2 max-h-[250px] overflow-y-auto">
                            </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                        <h3 class="font-bold text-slate-800 text-sm"><i class="fa-solid fa-user-gear text-indigo-600 mr-2"></i> স্টুডেন্ট ডাটাবেজ কন্ট্রোল</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-slate-100 text-slate-600 uppercase font-semibold">
                                <tr>
                                    <th class="px-4 py-3">Name</th>
                                    <th class="px-4 py-3">ID</th>
                                    <th class="px-4 py-3">Batch & Trimester</th>
                                    <th class="px-4 py-3 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module">
    import { auth, db } from "./assets/js/app.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // সিকিউরিটি চেক: ইউজার অ্যাডমিন কিনা তা নিশ্চিত করা
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            // যদি ফায়ারবেস সেশনই না পায়, তবে লগইনে পাঠাবে
            console.log("No user logged in. Redirecting...");
            window.location.replace("./login.html");
        } else {
            try {
                // ডাটাবেজ থেকে এই ইউজারের রোল রিড করা
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    console.log("User Data Found:", userData);

                    // এখানে খুব কড়াকড়িভাবে চেক করা হচ্ছে রোল 'admin' কিনা
                    if (userData.role === 'admin') {
                        console.log("Access Granted! Welcome Admin.");
                        // ড্যাশবোর্ডের লোডিং স্ক্রিন থাকলে তা সরিয়ে আসল ড্যাশবোর্ড দেখানোর জন্য:
                        document.body.classList.remove('invisible'); 
                    } else {
                        // যদি রোল admin না হয়ে student হয়
                        alert("Access Denied! Admins Only.");
                        window.location.replace("./index.html");
                    }
                } else {
                    // যদি অথেন্টিকেশন আছে কিন্তু ডাটাবেজে কোনো ইউজার ডাটা নেই
                    console.log("No user document found in Firestore!");
                    window.location.replace("./login.html");
                }
            } catch (error) {
                console.error("Error checking admin role:", error);
                window.location.replace("./login.html");
            }
        }
    });

    // ড্যাশবোর্ডের লগআউট বাটনের লজিক (যদি বাটনের আইডি 'logoutBtn' হয়ে থাকে)
    const logoutBtn = document.getElementById('logoutBtn');
    if(logoutBtn) {
        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.replace("./login.html");
            });
        });
    }
</script>
</body>
</html>
