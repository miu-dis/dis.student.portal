<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DIS Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <nav class="bg-emerald-800 p-4 flex justify-between text-white items-center">
        <h1 class="font-bold">DIS Portal</h1>
        <div id="navAuthButtons" class="flex gap-2"></div>
    </nav>
    <div class="container mx-auto p-4 space-y-6">
        <div id="warningBanner" class="bg-red-600 text-white p-3 text-center hidden rounded shadow">⚠️ প্রোফাইল অসম্পূর্ণ!</div>
        
        <div class="flex gap-2">
            <select id="filterYear" class="p-2 border rounded"><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option></select>
            <select id="filterTermNum" class="p-2 border rounded"><option>1st Trimester</option><option>2nd Trimester</option><option>3rd Trimester</option></select>
            <select id="filterSession" class="p-2 border rounded"><option>Spring 2026</option><option>Summer 2026</option></select>
        </div>
        <div id="courseGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <div id="shareModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded w-full max-w-md">
            <h3 class="font-bold mb-4">Share Resource</h3>
            <form id="resourceShareForm" class="space-y-3">
                <input type="text" id="shareAuthor" placeholder="Name" required class="w-full p-2 border rounded">
                <input type="text" id="shareTitle" placeholder="Title" required class="w-full p-2 border rounded">
                <input type="file" id="shareFileField" class="w-full p-2 border rounded">
                <button type="submit" class="bg-indigo-600 text-white w-full py-2 rounded">Publish</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./assets/js/app.js";
        import { doc, getDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        let currentTrimesterKey = "";
        let selectedCode = "";

        async function refreshResources() {
            const key = `${document.getElementById('filterYear').value} - ${document.getElementById('filterTermNum').value} (${document.getElementById('filterSession').value})`;
            const mapDoc = await getDoc(doc(db, "course_mappings", key));
            const grid = document.getElementById('courseGrid');
            grid.innerHTML = '';
            if (mapDoc.exists()) {
                mapDoc.data().courses.forEach(c => {
                    grid.innerHTML += `<div class="p-4 border rounded bg-white">
                        <h3 class="font-bold">${c.title}</h3>
                        <p class="text-xs text-gray-500">${c.teacher}</p>
                        <button onclick="window.triggerShare('${c.code}')" class="bg-indigo-600 text-white p-2 mt-2 rounded text-xs">Share Note</button>
                    </div>`;
                });
            }
        }

        document.querySelectorAll('select').forEach(s => s.addEventListener('change', refreshResources));
        window.triggerShare = (code) => { selectedCode = code; document.getElementById('shareModal').classList.remove('hidden'); };
        
        document.getElementById('resourceShareForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('shareFileField').files[0];
            if (file && file.size > 2 * 1024 * 1024) { alert("2MB limit exceeded!"); return; }
            const reader = new FileReader();
            reader.onload = async () => {
                await addDoc(collection(db, "resources"), {
                    title: document.getElementById('shareTitle').value,
                    semester: currentTrimesterKey,
                    courseCode: selectedCode,
                    url: reader.result
                });
                alert("Published!");
                document.getElementById('shareModal').classList.add('hidden');
            };
            if(file) reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
