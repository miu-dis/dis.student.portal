<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIS Portal - Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4 transition-all duration-300">

    <div class="absolute top-4 right-4 bg-white shadow rounded-lg p-1 flex items-center space-x-1 border border-gray-200">
        <span class="text-sm px-2">🌐</span>
        <select id="langSelector" class="bg-transparent text-sm font-semibold text-gray-700 outline-none p-1 cursor-pointer">
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="bn">বাংলা</option>
        </select>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="flex justify-center mb-6">
            <img src="assets/img/logo.png" alt="University Logo" class="h-24 w-auto mx-auto transition-all duration-300">
        </div>
        
        <div class="text-center mb-6 border-t pt-4 border-gray-100">
            <h2 id="txtPortalTitle" class="text-2xl font-bold text-emerald-800">DIS Student Portal</h2>
            <p id="txtPortalSubtitle" class="text-gray-500 text-sm mt-1">Department of Islamic Studies</p>
        </div>

        <div class="flex bg-gray-100 p-1 rounded-lg mb-6 border border-gray-200">
            <button id="toggleLogin" class="w-1/2 py-2 text-center font-semibold rounded-md bg-emerald-700 text-white transition">Login</button>
            <button id="toggleRegister" class="w-1/2 py-2 text-center font-semibold rounded-md text-gray-600 hover:text-emerald-700 transition">Register</button>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label id="lblLoginEmail" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="loginEmail" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="example@email.com">
            </div>
            <div>
                <label id="lblLoginPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="loginPassword" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="••••••••">
            </div>
            <button type="submit" id="btnLogin" class="w-full bg-emerald-700 text-white py-2 rounded-md font-semibold hover:bg-emerald-800 transition shadow-md">Sign In</button>
        </form>

        <form id="registerForm" class="space-y-4 hidden">
            <div>
                <label id="lblRegName" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="regName" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="Your Name">
            </div>
            <div>
                <label id="lblRegUID" class="block text-sm font-medium text-gray-700 mb-1">University ID (UID)</label>
                <input type="text" id="regUID" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="e.g. 30027">
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label id="lblRegBatchNum" class="block text-sm font-medium text-gray-700 mb-1">Batch No</label>
                    <input type="number" id="regBatchNum" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm" placeholder="e.g. 52">
                </div>
                <div>
                    <label id="lblRegSemester" class="block text-sm font-medium text-gray-700 mb-1">Trimester</label>
                    <select id="regSemester" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 focus:outline-none text-sm">
                        <option value="1st Year - 1st Sem">1st Yr - 1st Sem</option>
                        <option value="1st Year - 2nd Sem">1st Yr - 2nd Sem</option>
                        <option value="1st Year - 3rd Sem">1st Yr - 3rd Sem</option>
                        <option value="2nd Year - 1st Sem">2nd Yr - 1st Sem</option>
                        <option value="2nd Year - 2nd Sem">2nd Yr - 2nd Sem</option>
                        <option value="2nd Year - 3rd Sem">2nd Yr - 3rd Sem</option>
                        <option value="3rd Year - 1st Sem">3rd Yr - 1st Sem</option>
                        <option value="3rd Year - 2nd Sem">3rd Yr - 2nd Sem</option>
                        <option value="3rd Year - 3rd Sem">3rd Yr - 3rd Sem</option>
                        <option value="4th Year - 1st Sem">4th Yr - 1st Sem</option>
                        <option value="4th Year - 2nd Sem">4th Yr - 2nd Sem</option>
                        <option value="4th Year - 3rd Sem">4th Yr - 3rd Sem</option>
                    </select>
                </div>
            </div>

            <div>
                <label id="lblRegEmail" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="regEmail" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="example@email.com">
            </div>
            <div>
                <label id="lblRegPassword" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="regPassword" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-emerald-500 focus:outline-none" placeholder="Min. 6 digits">
            </div>
            <button type="submit" id="btnRegister" class="w-full bg-emerald-700 text-white py-2 rounded-md font-semibold hover:bg-emerald-800 transition shadow-md">Complete Registration</button>
        </form>

    </div>

    <script>
        const translations = {
            en: {
                dir: "ltr",
                portalTitle: "DIS Student Portal",
                portalSubtitle: "Department of Islamic Studies",
                loginTab: "Login",
                registerTab: "Register",
                lblEmail: "Email Address",
                lblPassword: "Password",
                btnLogin: "Sign In",
                lblRegName: "Full Name",
                lblRegUID: "University ID (UID)",
                lblRegBatchNum: "Batch No",
                lblRegSemester: "Trimester",
                btnRegister: "Complete Registration"
            },
            ar: {
                dir: "rtl",
                portalTitle: "بوابة طلاب قسم الدراسات الإسلامية",
                portalSubtitle: "قسم الدراسات الإسلامية",
                loginTab: "تسجيل الدخول",
                registerTab: "إنشاء حساب",
                lblEmail: "البريد الإلكتروني",
                lblPassword: "كلمة المرور",
                btnLogin: "دخول",
                lblRegName: "الاسم الكامل",
                lblRegUID: "الرقم الجامعي (UID)",
                lblRegBatchNum: "رقم الدفعة",
                lblRegSemester: "الفصل الدراسي",
                btnRegister: "إتمام التسجيل"
            },
            bn: {
                dir: "ltr",
                portalTitle: "ডিআইএস স্টুডেন্ট পোর্টাল",
                portalSubtitle: "ইসলামিক স্টাডিজ বিভাগ",
                loginTab: "লগইন",
                registerTab: "নিবন্ধন",
                lblEmail: "ইমেইল ঠিকানা",
                lblPassword: "পাসওয়ার্ড",
                btnLogin: "প্রবেশ করুন",
                lblRegName: "পূর্ণ নাম",
                lblRegUID: "ইউনিভার্সিটি আইডি (UID)",
                lblRegBatchNum: "ব্যাচ নং",
                lblRegSemester: "সেমিস্টার",
                btnRegister: "নিবন্ধন সম্পন্ন করুন"
            }
        };

        const langSelector = document.getElementById('langSelector');

        function applyLanguage(lang) {
            const t = translations[lang];
            document.body.dir = t.dir;
            if(t.dir === "rtl") {
                document.body.classList.add('text-right');
            } else {
                document.body.classList.remove('text-right');
            }
            document.getElementById('txtPortalTitle').innerText = t.portalTitle;
            document.getElementById('txtPortalSubtitle').innerText = t.portalSubtitle;
            document.getElementById('toggleLogin').innerText = t.loginTab;
            document.getElementById('toggleRegister').innerText = t.registerTab;
            document.getElementById('lblLoginEmail').innerText = t.lblEmail;
            document.getElementById('lblRegEmail').innerText = t.lblEmail;
            document.getElementById('lblLoginPassword').innerText = t.lblPassword;
            document.getElementById('lblRegPassword').innerText = t.lblPassword;
            document.getElementById('btnLogin').innerText = t.btnLogin;
            document.getElementById('lblRegName').innerText = t.lblRegName;
            document.getElementById('lblRegUID').innerText = t.lblRegUID;
            document.getElementById('lblRegBatchNum').innerText = t.lblRegBatchNum;
            document.getElementById('lblRegSemester').innerText = t.lblRegSemester;
            document.getElementById('btnRegister').innerText = t.btnRegister;
        }

        langSelector.addEventListener('change', (e) => {
            localStorage.setItem('preferredLang', e.target.value);
            applyLanguage(e.target.value);
        });

        const savedLang = localStorage.getItem('preferredLang') || 'en';
        langSelector.value = savedLang;
        applyLanguage(savedLang);

        const toggleLogin = document.getElementById('toggleLogin');
        const toggleRegister = document.getElementById('toggleRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        toggleRegister.addEventListener('click', () => {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            toggleRegister.classList.add('bg-emerald-700', 'text-white');
            toggleRegister.classList.remove('text-gray-600');
            toggleLogin.classList.remove('bg-emerald-700', 'text-white');
            toggleLogin.classList.add('text-gray-600');
        });

        toggleLogin.addEventListener('click', () => {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            toggleLogin.classList.add('bg-emerald-700', 'text-white');
            toggleLogin.classList.remove('text-gray-600');
            toggleRegister.classList.remove('bg-emerald-700', 'text-white');
            toggleRegister.classList.add('text-gray-600');
        });
    </script>
    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
